name: Build Plugin DLL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore src/Funnies.csproj

      - name: Build DLL
        run: dotnet build src/Funnies.csproj -c Release -o ./build

      - name: Upload DLL
        uses: actions/upload-artifact@v3
        with:
          name: FunniesPlugin-DLL
          path: ./build
